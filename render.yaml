services:
  - type: web
    name: translingua
    runtime: docker
    plan: free
    
    # Dockerfile configuration
    dockerfilePath: ./Dockerfile
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: USE_LLM
        value: "true"
      - key: LLM_API_KEY
        sync: false  # Set in dashboard for security
      - key: LLM_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: LLM_MODEL
        value: "llama-3.1-8b-instant"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: TESSERACT_CMD
        value: "tesseract"
    
    # Scaling
    numInstances: 1
    
    # Health check
    healthCheckPath: /api/status
    
    # Timeout for build (optional)
    buildTimeout: 3600
